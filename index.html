<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adoção de Pets - ONG Esperança Animal</title>
  <style>
    body {
      font-family: Verdana, sans-serif;
      background-color: #f0f8ff;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #4caf50;
      color: white;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .lista-animais {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 25px;
      margin: 30px;
    }

    .caixa-pet {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 10px;
      width: 240px;
      padding: 15px;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.1);
    }

    .caixa-pet img {
      width: 100%;
      border-radius: 10px;
    }

    .caixa-pet h2 {
      margin: 10px 0 5px;
      color: #2c3e50;
    }

    .caixa-pet p {
      font-size: 14px;
      color: #555;
    }

    .caixa-pet button {
      margin-top: 10px;
      padding: 8px 12px;
      background: #ff6600;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .caixa-pet button:hover {
      background: #ff8533;
    }

    footer {
      background-color: #4caf50;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <!-- Cabeçalho da página -->
  <header>
    <h1>Adote um Amigo!</h1>
    <p>Conheça os pets disponíveis para adoção na ONG Esperança Animal</p>
  </header>

  <!-- Lista de animais -->
  <div class="lista-animais">
    <div class="caixa-pet">
      <img src="paçoca.jpg" alt="Paçoca">
      <h2>Paçoca</h2>
      <p>Idade: 3 anos</p>
      <p>Adora brincar com crianças e correr no quintal.</p>
      <button onclick="window.location.href='https://wa.me/5599999999999?text=Tenho%20interesse%20em%20adotar%20o%20Rex'">Quero Adotar</button>
    </div>

    <div class="caixa-pet">
      <img src="mimi.jpg" alt="Gatinha Mimi">
      <h2>Mimi</h2>
      <p>Idade: 2 ano</p>
      <p>Carinhosa, bem tranquila e uma ótima companhia.</p>
      <button onclick="window.location.href='https://wa.me/5599999999999?text=Tenho%20interesse%20em%20adotar%20a%20Mimi'">Quero Adotar</button>
    </div>
  </div>

  <!-- Rodapé com contato -->
  <footer>
    <p>ONG Esperança Animal - Blumenau/SC</p>
    <p>Contato: <a href="https://wa.me/5599999999999" style="color:white; text-decoration:underline;">WhatsApp da ONG</a></p>
  </footer>
</body>
