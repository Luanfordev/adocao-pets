<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adoção de Pets</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
    }
    h1 {
      color: #2c3e50;
    }
    .pets {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      width: 220px;
      padding: 15px;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 8px;
    }
    .card h2 {
      margin: 10px 0 5px;
      color: #34495e;
    }
    .card p {
      font-size: 14px;
      color: #555;
    }
    .card button {
      margin-top: 10px;
      padding: 8px 12px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .card button:hover {
      background: #2ecc71;
    }
  </style>
</head>
<body>
  <h1>Adote um Amigo!</h1>
  <p>Conheça os pets disponíveis para adoção na agropecuária.</p>

  <div class="pets">
    <div class="card">
      <img src="rex.jpg" alt="Cachorro Rex">
      <h2>Rex</h2>
      <p>Idade: 2 anos</p>
      <p>Dócil e brincalhão</p>
      <button>Quero Adotar</button>
    </div>

    <div class="card">
      <img src="mimi.jpg" alt="Gatinha Mimi">
      <h2>Mimi</h2>
      <p>Idade: 1 ano</p>
      <p>Carinhosa e tranquila</p>
      <button>Quero Adotar</button>
    </div>
  </div>
</body>
</html>
